name: SLM Automation UI Tests

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  chrome-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B clean test -Dheadless=true -Dbrowser=chrome -Dthreads=2

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slm-automation-test-artifacts
          path: |
            target/cucumber-reports
            target/allure-results
            target/logs

